<!DOCTYPE html>
<html>
<head>
<title>Blow the Candle</title>

<style>
body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
background:#111;
color:white;
font-family:sans-serif;
}

.screen{
display:none;
flex-direction:column;
align-items:center;
}

.active{
display:flex;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}

.msg{
margin-top:10px;
color:red;
}

.candle{
width:30px;
height:100px;
background:#fff3c4;
position:relative;
margin-top:40px;
border-radius:5px;
}

.flame{
width:20px;
height:30px;
background:orange;
border-radius:50%;
position:absolute;
top:-30px;
left:5px;
animation:flicker 0.2s infinite;
}

@keyframes flicker{
0%{transform:scale(1);opacity:0.8;}
50%{transform:scale(1.1);opacity:1;}
100%{transform:scale(0.9);opacity:0.7;}
}

.off{
display:none;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">
<h2>Enable Microphone 🎤</h2>
<button onclick="startMic()">Enable Microphone</button>
<div class="msg" id="msg1"></div>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">
<h2>Blow the candle 🕯️</h2>

<div class="candle">
<div class="flame" id="flame"></div>
</div>

<div class="msg" id="msg2"></div>
</div>

<script>

function startMic(){

const msg=document.getElementById("msg1");

navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{

document.getElementById("screen1").classList.remove("active");
document.getElementById("screen2").classList.add("active");

const audioContext=new AudioContext();
const mic=audioContext.createMediaStreamSource(stream);
const analyser=audioContext.createAnalyser();

analyser.fftSize=512;

mic.connect(analyser);

const data=new Uint8Array(analyser.fftSize);

let avgVolume=0;
let blowFrames=0;

function detectSound(){

analyser.getByteTimeDomainData(data);

let sum=0;

for(let i=0;i<data.length;i++){
sum+=Math.abs(data[i]-128);
}

let volume=sum/data.length;

/* smooth average background noise */
avgVolume=avgVolume*0.95+volume*0.05;

/* detect strong blow relative to background */
if(volume>avgVolume*3){

blowFrames++;

}else{

blowFrames=0;

}

if(blowFrames>4){

document.getElementById("flame").classList.add("off");
document.getElementById("msg2").style.color="lightgreen";
document.getElementById("msg2").innerText="Candle blown out! 🎉";

return;

}

requestAnimationFrame(detectSound);

}

detectSound();

})
.catch(err=>{
msg.innerText="Microphone permission denied.";
});

}

</script>

</body>
</html>
