<!DOCTYPE html>
<html>
<head>
  <title>Blow the Candle</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #111;
      color: white;
      font-family: sans-serif;
    }

    .candle {
      width: 30px;
      height: 100px;
      background: #fff3c4;
      position: relative;
      margin-top: 40px;
      border-radius: 5px;
    }

    .flame {
      width: 20px;
      height: 30px;
      background: orange;
      border-radius: 50%;
      position: absolute;
      top: -30px;
      left: 5px;
      animation: flicker 0.2s infinite;
    }

    @keyframes flicker {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.7; }
    }

    .off {
      display: none;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>

<body>

  <h2>Blow the candle 🕯️</h2>

  <button onclick="startMic()">Enable Microphone</button>
  <div class="msg" id="msg"></div>

  <div class="candle">
    <div class="flame" id="flame"></div>
  </div>

<script>
function startMic() {
  const msg = document.getElementById("msg");

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      msg.style.color = "lightgreen";
      msg.innerText = "Mic enabled. Blow into it!";

      const audioContext = new AudioContext();
      const mic = audioContext.createMediaStreamSource(stream);
      const analyser = audioContext.createAnalyser();

      mic.connect(analyser);

      const data = new Uint8Array(analyser.fftSize);

      function detectSound() {
        analyser.getByteTimeDomainData(data);

        let volume = 0;
        for (let i = 0; i < data.length; i++) {
          volume += Math.abs(data[i] - 128);
        }

        if (volume > 2000) {
          document.getElementById("flame").classList.add("off");
          msg.innerText = "Candle blown out! 🎉";
        }

        requestAnimationFrame(detectSound);
      }

      detectSound();
    })
    .catch(err => {
      msg.style.color = "red";
      msg.innerText = "Microphone permission denied or not available.";
    });
}
</script>

</body>
</html>
