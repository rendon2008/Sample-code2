<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cake Recreation</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
    font-family: sans-serif;
  }

  .cake {
    position: relative;
    width: 220px;
    height: 180px;
    background: #f7b6c2;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }

  /* White drip icing */
  .drip {
    position: absolute;
    top: -20px;
    width: 100%;
    height: 50px;
    background: #fff;
    border-radius: 20px;
  }

  .drip::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 30px;
    top: 30px;
    background: repeating-linear-gradient(
      to right,
      #fff 0 15px,
      transparent 15px 30px
    );
    border-radius: 0 0 20px 20px;
  }

  /* Bottom frosting */
  .base {
    position: absolute;
    bottom: -15px;
    width: 100%;
    height: 30px;
    background: repeating-radial-gradient(
      circle,
      #f08aa0 0 10px,
      #f7b6c2 10px 20px
    );
    border-radius: 20px;
  }

  /* Strawberry */
  .strawberry {
    position: absolute;
    top: -45px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 45px;
    background: red;
    border-radius: 50% 50% 60% 60%;
  }

  .strawberry::before {
    content: "";
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 25px;
    height: 15px;
    background: green;
    border-radius: 50%;
  }

  /* Decorative dots */
  .dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ff6b81;
    border-radius: 50%;
  }

  .dot.white {
    background: white;
  }

</style>
</head>
<body>

<div class="cake">
  <div class="drip"></div>
  <div class="base"></div>
  <div class="strawberry"></div>

  <!-- sprinkle dots -->
  <div class="dot" style="top: 50px; left: 30px;"></div>
  <div class="dot white" style="top: 70px; left: 80px;"></div>
  <div class="dot" style="top: 90px; left: 150px;"></div>
  <div class="dot white" style="top: 120px; left: 50px;"></div>
</div>

</body>
</html>
