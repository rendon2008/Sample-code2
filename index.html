<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Riri</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== Microphone Permission Screen ===== -->
<div id="permission-screen" class="permission-screen">
    <div class="permission-content">
        <div class="microphone-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M19 11C19 15.42 15.87 19 12 19C8.13 19 5 15.42 5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 19V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <p class="permission-text">Please allow microphone access<br>to blow out the candles</p>
<button id="request-mic-btn" class="request-mic-btn" onclick="requestMicrophoneAccess()">Request Microphone Access</button>    </div>
</div>
    <!-- ===== Main Birthday Scene ===== -->
    <div id="birthday-scene" class="birthday-scene hidden">

        <!-- Background -->
        <div class="bg-gradient"></div>
        <div class="sparkles"></div>

        <!-- Top Message -->
        <div id="message" class="message">BLOW THE CANDLES!!</div>

        <!-- ===== Cake ===== -->

                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                    </div>
                    <div class="side-flowers">
                        <div class="side-flower"></div>
                        <div class="side-flower"></div>
                        <div class="side-flower"></div>
                        <div class="side-flower"></div>
                    </div>
                    <div class="sprinkles">
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>

                </div>

                <div class="cake-top">

                        <div class="drip drip-4"></div>
                        <div class="drip drip-5"></div>
                        <div class="drip drip-6"></div>
                        <div class="drip drip-7"></div>
                        <div class="drip drip-8"></div>
                    </div>
                    <div class="icing-swirls">
                        <div class="swirl swirl-1">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                        <div class="swirl swirl-2">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                        <div class="swirl swirl-3">
                            <div class="candle">

                                    <div class="candle-stripe"></div>

                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                        <div class="swirl swirl-4">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                        <div class="swirl swirl-5">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                    </div>
                    <div class="strawberry-container">
                        <div class="strawberry">
                            <div class="strawberry-body"></div>
                            <div class="strawberry-seeds">
                                <div class="seed"></div>
                                <div class="seed"></div>
                                <div class="seed"></div>
                                <div class="seed"></div>
                                <div class="seed"></div>
                                <div class="seed"></div>
                            </div>
                            <div class="strawberry-leaves">
                                <div class="leaf"></div>
                                <div class="leaf"></div>
                                <div class="leaf"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- end .cake -->
            <div class="cake-shadow"></div>
        </div><!-- end .cake-container -->

        <!-- Relight Button -->

        <!-- Bottom Buttons Row -->


        <!-- Bottom Buttons Row -->
        <div id="bottom-btns" class="bottom-btns hidden">

            <!-- Bouquet Button -->

            <div id="bouquet-btn" class="bouquet-btn">

            <path style="fill:#FF1493;" d="M488.235,244.153c8.079-7.935,10.58-17.124,11.329-21.375c4.047-22.953-11.037-49.078-32.937-57.049c-4.041-1.47-13.197-3.888-24.063-0.907c-2.712-10.698-9.539-18.769-17.688-23.915c-11.087-7.003-26.375-9.416-40.341-6.429c3.433-5.351,5.786-11.381,6.946-17.954c5.124-29.06-13.974-62.141-41.704-72.233c-11.623-4.23-23.679-4.016-35.055,0.587c-1.703-12.154-7.547-22.703-17.019-30.653c-22.605-18.969-60.803-18.969-83.407,0c-9.474,7.95-15.317,18.499-17.019,30.653c-11.375-4.601-23.433-4.817-35.055-0.587c-27.73,10.093-46.828,43.172-41.704,72.233c1.16,6.575,3.513,12.603,6.946,17.955c-13.967-2.987-29.255-0.574-40.341,6.427c-8.149,5.147-14.978,13.218-17.69,23.915c-10.859-2.98-20.02-0.562-24.063,0.907c-21.9,7.971-36.984,34.097-32.937,57.049c0.75,4.251,3.251,13.44,11.329,21.375c-8.079,7.935-10.58,17.124-11.329,21.375c-4.047,22.953,11.037,49.078,32.937,57.049c4.058,1.475,13.262,3.905,24.177,0.876c2.833,10.963,9.539,17.724,12.846,20.499c8.928,7.491,20.932,11.236,32.937,11.236s24.01-3.745,32.937-11.236c1.553-1.303,3.856-3.499,6.156-6.583l21.447,26.943c2.745,3.449,6.797,5.244,10.888,5.244c3.036,0,6.092-0.989,8.652-3.027c6.007-4.782,7.002-13.53,2.218-19.54l-18.171-22.825c2.45-0.471,4.447-1.082,5.832-1.587c16.791-6.112,29.562-22.896,32.79-40.739c7.077,4.952,15.337,8.288,24.014,9.994v164.552c0,7.679,6.227,13.906,13.906,13.906c7.679,0,13.906-6.227,13.906-13.906V291.832c8.677-1.706,16.937-5.041,24.014-9.994c3.228,17.843,15.999,34.627,32.79,40.739c1.386,0.503,3.383,1.115,5.832,1.587l-18.171,22.825c-4.784,6.009-3.791,14.757,2.218,19.54c2.56,2.039,5.617,3.027,8.652,3.027c4.09,0,8.143-1.797,10.888-5.244l21.447-26.943c2.3,3.084,4.603,5.28,6.156,6.583c8.928,7.491,20.933,11.236,32.937,11.236c12.005,0,24.01-3.745,32.937-11.236c3.307-2.774,10.014-9.535,12.846-20.499c10.912,3.029,20.12,0.599,24.177-0.876c21.9-7.971,36.984-34.097,32.937-57.049C498.814,261.278,496.314,252.088,488.235,244.153z"/>
        </g>
    </svg>
</div>
            

            
            <!-- Envelope Icon Button -->
            <div id="message-btn" class="message-btn">
                <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="96" height="76" rx="8" ry="8" fill="white" stroke="#333" stroke-width="3"/>
                    <line x1="2" y1="78" x2="38" y2="40" stroke="#333" stroke-width="2.5"/>
                    <line x1="98" y1="78" x2="62" y2="40" stroke="#333" stroke-width="2.5"/>
                    <line x1="2" y1="2" x2="38" y2="40" stroke="#333" stroke-width="2.5"/>
                    <line x1="98" y1="2" x2="62" y2="40" stroke="#333" stroke-width="2.5"/>
                    <path d="M50 58 C50 58 28 44 28 32 C28 24 34 19 40 19 C44 19 48 22 50 25 C52 22 56 19 60 19 C66 19 72 24 72 32 C72 44 50 58 50 58Z" fill="#FF1493" stroke="#333" stroke-width="2"/>
                </svg>
            </div>

            <!-- Photo Slider Button -->
            <div id="openSliderBtn" class="photo-btn">
                <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="10" width="96" height="65" rx="8" ry="8" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="50" cy="43" r="18" fill="none" stroke="#FF1493" stroke-width="3"/>
                    <circle cx="50" cy="43" r="10" fill="#FF1493"/>
                    <circle cx="80" cy="22" r="5" fill="#FF1493"/>
                </svg>
            </div>

        </div>
        
        


        <!-- ===== Envelope Modal ===== -->
        <div class="env-overlay" id="envOverlay">
            <div class="env-wrapper" id="envWrapper">

                <!-- Letter inside envelope -->
                <div class="letter" id="letter">
                    <div class="letter-lines">
                        <div class="letter-line"></div>
                        <div class="letter-line"></div>
                    </div>
                    <div class="letter-text">
                        I'm so sorry baby, my cake to u is online 🥹<br>
                        but every memory we have is real & I made u something special —
                    </div>
                    <div class="letter-lines" style="margin-top:10px; margin-bottom:0">
                        <div class="letter-line"></div>
                        <div class="letter-line"></div>
                    </div>

                    <div class="letter-heart">🌸</div>
                </div>

                <!-- Envelope shell -->
                <div class="envelope">
                    <div class="env-body">
                        <div class="env-bottom-left"></div>
                        <div class="env-bottom-right"></div>
                    </div>
                    <div class="env-flap" id="envFlap"></div>
                    <div class="heart-seal" id="heartSeal">❤️</div>
                </div>

                <div class="close-hint">click anywhere to close</div>
            </div>
        </div>

        <!-- ===== Card Slider Fullscreen Overlay ===== -->
        <div id="sliderOverlay" class="slider-overlay">
            <button id="sliderClose" class="slider-close">✕</button>
            <div id="cardStack" class="card-stack"></div>
            <div class="slider-hint" id="sliderHint">← swipe in any direction →</div>
        </div>

        <!-- Celebration Elements -->
        <canvas id="confetti-canvas"></canvas>
        <div id="balloons" class="balloons"></div>
        <div class="party-poppers">
            <div class="popper popper-left"></div>
            <div class="popper popper-right"></div>
        </div>

    </div><!-- end #birthday-scene -->

    <script src="script.js"></script>
</body>
