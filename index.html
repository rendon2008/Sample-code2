<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Surprise</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background canvas for effects -->
  <canvas id="confetti"></canvas>

  <!-- Main Scene (hidden until permission granted) -->
  <div id="scene" class="hidden">

    <div id="message">BLOW THE CANDLES!!</div>

    <div class="cake-wrapper">
      <div class="cake">

        <!-- top decorations -->
        <div class="top-row">
          <div class="swirl candle-slot"><div class="candle"></div></div>
          <div class="swirl candle-slot"><div class="candle"></div></div>
          <div class="swirl candle-slot"><div class="candle"></div></div>
          <div class="strawberry candle-slot large-center">
            <div class="candle center"></div>
          </div>
          <div class="swirl candle-slot"><div class="candle"></div></div>
          <div class="swirl candle-slot"><div class="candle"></div></div>
          <div class="swirl candle-slot"><div class="candle"></div></div>
        </div>

        <!-- cake body -->
        <div class="cake-body"></div>

      </div>
    </div>

    <button id="relightBtn">Relight the candles</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
