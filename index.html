<body>

    <!-- ===== Password Screen ===== -->
    <div id="password-screen" class="password-screen">
        <p class="password-title">For your eyes only.</p>
        <div class="padlock">
            <div class="padlock-shackle"></div>
            <div class="padlock-heart">
                <div class="digit-slots">
                    <div class="digit-slot">
                        <button class="digit-btn plus" data-index="0">+</button>
                        <span class="digit-display" data-index="0">0</span>
                        <button class="digit-btn minus" data-index="0">−</button>
                    </div>
                    <div class="digit-slot">
                        <button class="digit-btn plus" data-index="1">+</button>
                        <span class="digit-display" data-index="1">0</span>
                        <button class="digit-btn minus" data-index="1">−</button>
                    </div>
                    <div class="digit-slot">
                        <button class="digit-btn plus" data-index="2">+</button>
                        <span class="digit-display" data-index="2">0</span>
                        <button class="digit-btn minus" data-index="2">−</button>
                    </div>
                </div>
                <button class="enter-btn" id="enter-btn">Enter</button>
            </div>
        </div>
    </div>

    <!-- ===== Microphone Permission Screen ===== -->
<div id="permission-screen" class="permission-screen">
    <div class="permission-content">
        <div class="microphone-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                <path d="M12 19V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <p class="permission-text">Please allow microphone access<br>to blow out the candles</p>
<button id="request-mic-btn" class="request-mic-btn" onclick="requestMicrophoneAccess()">Request Microphone Access</button>    </div>
</div>
