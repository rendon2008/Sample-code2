<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blow the Candle</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#111;
}

.candle{
  position:relative;
  width:40px;
  height:120px;
  background:#fff;
  border-radius:10px;
}

.flame{
  position:absolute;
  top:-40px;
  left:50%;
  transform:translateX(-50%);
  width:20px;
  height:40px;
  background:orange;
  border-radius:50%;
  box-shadow:0 0 20px orange;
  transition:opacity 0.3s;
}

.flame.off{
  opacity:0;
}
</style>

</head>

<body>

<div class="candle">
  <div id="flame" class="flame"></div>
</div>

<script>

navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

  const audioContext = new AudioContext();
  const mic = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();

  analyser.fftSize = 512;

  const data = new Uint8Array(analyser.frequencyBinCount);

  mic.connect(analyser);

  let hitCount = 0;

  function detectBlow(){

    analyser.getByteFrequencyData(data);

    let volume = 0;

    for(let i = 0; i < data.length; i++){
      volume += data[i];
    }

    volume = volume / data.length;

    if(volume > 60){   // sensitivity (increase = harder to trigger)
      hitCount++;
    } else {
      hitCount = 0;
    }

    if(hitCount > 5){
      document.getElementById("flame").classList.add("off");
    }

    requestAnimationFrame(detectBlow);
  }

  detectBlow();

}).catch(err => {
  alert("Please allow microphone access to blow the candle.");
});

</script>

</body>
</html>
