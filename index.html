<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Riri</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Microphone Permission Screen -->
    <div id="permission-screen" class="permission-screen">
        <div class="permission-content">
            <div class="microphone-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M19 11C19 15.42 15.87 19 12 19C8.13 19 5 15.42 5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 19V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <p class="permission-text">Please allow microphone access<br>to blow out the candles</p>
        </div>
    </div>

    <!-- Main Birthday Scene -->
    <div id="birthday-scene" class="birthday-scene hidden">
        <div class="bg-gradient"></div>
        <div class="sparkles"></div>

        <div id="message" class="message">BLOW THE CANDLES!!</div>

        <div class="cake-container">
            <div class="cake">
                <div class="cake-plate"></div>
                <div class="cake-base">
                    <div class="piped-border">
                        <div class="piped-dot"></div><div class="piped-dot"></div><div class="piped-dot"></div>
                        <div class="piped-dot"></div><div class="piped-dot"></div><div class="piped-dot"></div>
                        <div class="piped-dot"></div><div class="piped-dot"></div><div class="piped-dot"></div>
                        <div class="piped-dot"></div><div class="piped-dot"></div><div class="piped-dot"></div>
                    </div>
                    <div class="side-flowers">
                        <div class="side-flower"></div><div class="side-flower"></div>
                        <div class="side-flower"></div><div class="side-flower"></div>
                    </div>
                    <div class="sprinkles">
                        <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
                        <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
                        <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
                        <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
                    </div>
                </div>
                <div class="cake-top">
                    <div class="drip-frosting">
                        <div class="drip drip-1"></div><div class="drip drip-2"></div>
                        <div class="drip drip-3"></div><div class="drip drip-4"></div>
                        <div class="drip drip-5"></div><div class="drip drip-6"></div>
                        <div class="drip drip-7"></div><div class="drip drip-8"></div>
                    </div>
                    <div class="icing-swirls">
                        <div class="swirl swirl-1"><div class="candle"><div class="candle-body"><div class="candle-stripe"></div><div class="candle-stripe"></div><div class="candle-stripe"></div></div><div class="flame-container"><div class="flame"></div><div class="flame-glow"></div></div><div class="smoke"></div></div></div>
                        <div class="swirl swirl-2"><div class="candle"><div class="candle-body"><div class="candle-stripe"></div><div class="candle-stripe"></div><div class="candle-stripe"></div></div><div class="flame-container"><div class="flame"></div><div class="flame-glow"></div></div><div class="smoke"></div></div></div>
                        <div class="swirl swirl-3"><div class="candle"><div class="candle-body"><div class="candle-stripe"></div><div class="candle-stripe"></div><div class="candle-stripe"></div></div><div class="flame-container"><div class="flame"></div><div class="flame-glow"></div></div><div class="smoke"></div></div></div>
                        <div class="swirl swirl-4"><div class="candle"><div class="candle-body"><div class="candle-stripe"></div><div class="candle-stripe"></div><div class="candle-stripe"></div></div><div class="flame-container"><div class="flame"></div><div class="flame-glow"></div></div><div class="smoke"></div></div></div>
                        <div class="swirl swirl-5"><div class="candle"><div class="candle-body"><div class="candle-stripe"></div><div class="candle-stripe"></div><div class="candle-stripe"></div></div><div class="flame-container"><div class="flame"></div><div class="flame-glow"></div></div><div class="smoke"></div></div></div>
                    </div>
                    <div class="strawberry-container">
                        <div class="strawberry">
                            <div class="strawberry-body"></div>
                            <div class="strawberry-seeds">
                                <div class="seed"></div><div class="seed"></div><div class="seed"></div>
                                <div class="seed"></div><div class="seed"></div><div class="seed"></div>
                            </div>
                            <div class="strawberry-leaves">
                                <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="cake-shadow"></div>
        </div>

        <button id="relight-btn" class="relight-btn hidden">Relight the candles</button>

        <div id="message-btn" class="message-btn hidden">
            <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="96" height="76" rx="8" ry="8" fill="white" stroke="#333" stroke-width="3"/>
                <line x1="2" y1="78" x2="38" y2="40" stroke="#333" stroke-width="2.5"/>
                <line x1="98" y1="78" x2="62" y2="40" stroke="#333" stroke-width="2.5"/>
                <line x1="2" y1="2" x2="38" y2="40" stroke="#333" stroke-width="2.5"/>
                <line x1="98" y1="2" x2="62" y2="40" stroke="#333" stroke-width="2.5"/>
                <path d="M50 58 C50 58 28 44 28 32 C28 24 34 19 40 19 C44 19 48 22 50 25 C52 22 56 19 60 19 C66 19 72 24 72 32 C72 44 50 58 50 58Z" fill="#FF1493" stroke="#333" stroke-width="2"/>
            </svg>
        </div>

        <!-- Envelope Modal -->
        <div class="env-overlay" id="envOverlay">
            <div class="env-wrapper" id="envWrapper">
                <div class="letter" id="letter">
                    <div class="letter-lines">
                        <div class="letter-line"></div>
                        <div class="letter-line"></div>
                    </div>
                    <div class="letter-text">I'm so sorry baby, my cake to u is online 🥹<br>but every memory we have is real &amp; I made u something special —</div>
                    <div class="letter-lines" style="margin-top:10px;margin-bottom:0">
                        <div class="letter-line"></div>
                        <div class="letter-line"></div>
                    </div>

                    <!-- Swipe Photos CTA -->
                    <div class="letter-cta" id="openSliderBtn">
                        <div class="cta-stack">
                            <div class="cta-card cta-card-3"></div>
                            <div class="cta-card cta-card-2"></div>
                            <div class="cta-card cta-card-1">📸</div>
                        </div>
                        <div class="cta-label">swipe our photos →</div>
                    </div>

                    <div class="letter-heart">🌸</div>
                </div>
                <div class="envelope">
                    <div class="env-body">
                        <div class="env-bottom-left"></div>
                        <div class="env-bottom-right"></div>
                    </div>
                    <div class="env-flap" id="envFlap"></div>
                    <div class="heart-seal" id="heartSeal">❤️</div>
                </div>
                <div class="close-hint">click anywhere to close</div>
            </div>
        </div>

        <!-- ===== CARD SLIDER FULLSCREEN ===== -->
        <div id="sliderOverlay" class="slider-overlay">
            <button id="sliderClose" class="slider-close">✕</button>
            <div id="cardStack" class="card-stack"></div>
            <div class="slider-hint" id="sliderHint">← swipe in any direction →</div>
        </div>

        <!-- Celebration Elements -->
        <canvas id="confetti-canvas"></canvas>
        <div id="balloons" class="balloons"></div>
        <div class="party-poppers">
            <div class="popper popper-left"></div>
            <div class="popper popper-right"></div>
        </div>
    </div>

    <script src="script.js"></script>

    <style>
    /* ===== LETTER CTA ===== */
    .letter-cta {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 18px 0 10px;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }
    .cta-stack {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 8px;
    }
    .cta-card {
        position: absolute;
        inset: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, #fde8f0 0%, #f5b0c8 100%);
        border: 1.5px solid #f5b0c8;
        box-shadow: 0 4px 12px rgba(200,100,140,0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        transition: transform 0.3s ease;
    }
    .cta-card-3 { transform: rotate(-8deg) translateY(6px); opacity: 0.5; }
    .cta-card-2 { transform: rotate(-3deg) translateY(3px); opacity: 0.75; }
    .cta-card-1 { transform: rotate(2deg); }
    .letter-cta:hover .cta-card-1 { transform: rotate(2deg) translateY(-4px); }
    .letter-cta:hover .cta-card-2 { transform: rotate(-3deg) translateY(0px); }
    .cta-label {
        font-family: 'Georgia', serif;
        font-size: 13px;
        color: #c8537e;
        font-style: italic;
        letter-spacing: 0.5px;
        animation: ctaPulse 1.6s ease-in-out infinite;
    }
    @keyframes ctaPulse {
        0%,100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    /* ===== CARD SLIDER OVERLAY ===== */
    .slider-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.88);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
    }
    .slider-overlay.active {
        opacity: 1;
        pointer-events: all;
    }
    .slider-close {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255,255,255,0.15);
        border: none;
        color: #fff;
        font-size: 1.4rem;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        transition: background 0.2s;
    }
    .slider-close:hover { background: rgba(255,255,255,0.3); }

    /* ===== CARD STACK ===== */
    .card-stack {
        position: relative;
        width: min(320px, 80vw);
        height: min(400px, 75vh);
        /* perspective for depth */
        perspective: 1000px;
    }

    .photo-card {
        position: absolute;
        inset: 0;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.2);
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        will-change: transform;
        background: #1a1a1a;
    }
    .photo-card:active { cursor: grabbing; }
    .photo-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        display: block;
    }
    /* Placeholder gradient when no image loads */
    .photo-card.placeholder {
        background: linear-gradient(135deg, #f8c8dc 0%, #f5b0c8 40%, #e885a8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 5rem;
    }

    /* Swipe direction indicator */
    .swipe-indicator {
        position: absolute;
        top: 20px;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 1px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.1s;
        z-index: 5;
    }
    .swipe-indicator.left { right: 20px; background: #ff4d6d; color: #fff; }
    .swipe-indicator.right { left: 20px; background: #4ade80; color: #fff; }
    .swipe-indicator.up { bottom: 20px; background: #60a5fa; color: #fff; }
    .swipe-indicator.down { top: 20px; left: 50%; transform: translateX(-50%); background: #f97316; color: #fff; }

    .slider-hint {
        position: absolute;
        bottom: 30px;
        color: rgba(255,255,255,0.55);
        font-size: 13px;
        font-style: italic;
        letter-spacing: 1px;
        text-align: center;
        transition: opacity 0.5s;
    }
    .slider-hint.fade { opacity: 0; }
    </style>

    <script>
    // ===== CARD SLIDER =====
    (function() {
        // Image list — add/remove entries freely, they cycle infinitely
        const IMAGES = [
            'image1.jpg','image2.jpg','image3.jpg','image4.jpg',
            'image5.jpg','image6.jpg','image7.jpg','image8.jpg'
        ];

        // Fallback emoji if image fails
        const FALLBACK_EMOJI = ['💖','🌸','✨','🎀','💝','🎉','🥰','🌺'];

        const VISIBLE_CARDS = 4; // how many cards to render in the stack at once
        const sliderOverlay = document.getElementById('sliderOverlay');
        const cardStack    = document.getElementById('cardStack');
        const sliderClose  = document.getElementById('sliderClose');
        const sliderHint   = document.getElementById('sliderHint');
        const openBtn      = document.getElementById('openSliderBtn');

        let currentIndex = 0; // index of the top card in IMAGES
        let isDragging   = false;
        let startX = 0, startY = 0;
        let currentX = 0, currentY = 0;
        let topCard = null;
        let animating = false;
        let hintTimer = null;

        // ---- Build the visual stack ----
        function buildStack() {
            cardStack.innerHTML = '';
            // render VISIBLE_CARDS cards, bottom first
            for (let i = VISIBLE_CARDS - 1; i >= 0; i--) {
                const imgIdx = (currentIndex + i) % IMAGES.length;
                const card   = createCard(imgIdx, i);
                cardStack.appendChild(card);
                positionCard(card, i, false);
            }
        }

        function createCard(imgIdx, stackPos) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.dataset.stackPos = stackPos;
            card.dataset.imgIdx   = imgIdx;

            const img = document.createElement('img');
            img.src = IMAGES[imgIdx];
            img.alt = '';
            img.draggable = false;
            img.onerror = function() {
                card.classList.add('placeholder');
                card.innerHTML = FALLBACK_EMOJI[imgIdx % FALLBACK_EMOJI.length];
            };
            card.appendChild(img);

            // Swipe indicators (only on top card)
            if (stackPos === 0) {
                ['left','right','up','down'].forEach(dir => {
                    const ind = document.createElement('div');
                    ind.className = `swipe-indicator ${dir}`;
                    ind.textContent = dir === 'left' ? 'NOPE' : dir === 'right' ? 'LOVE' : dir === 'up' ? 'WOW' : 'CUTE';
                    card.appendChild(ind);
                });
                attachDragListeners(card);
            }

            return card;
        }

        // Stack visual positions
        function positionCard(card, stackPos, animate) {
            const scale  = 1 - stackPos * 0.045;
            const yOff   = stackPos * 12;
            const shadow = stackPos === 0 ? '0 12px 40px rgba(0,0,0,0.45)' : `0 ${4+stackPos*2}px ${12+stackPos*6}px rgba(0,0,0,0.25)`;

            card.style.transition = animate ? 'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.35s ease' : 'none';
            card.style.transform  = `translateY(${yOff}px) scale(${scale})`;
            card.style.zIndex     = VISIBLE_CARDS - stackPos;
            card.style.boxShadow  = shadow;
        }

        // ---- Drag logic ----
        function attachDragListeners(card) {
            card.addEventListener('mousedown',  onDragStart, { passive: true });
            card.addEventListener('touchstart', onDragStart, { passive: true });
        }

        function onDragStart(e) {
            if (animating) return;
            isDragging = true;
            topCard = e.currentTarget;

            const pt = e.touches ? e.touches[0] : e;
            startX = pt.clientX;
            startY = pt.clientY;
            currentX = 0; currentY = 0;

            topCard.style.transition = 'none';
            topCard.style.cursor     = 'grabbing';

            document.addEventListener('mousemove',  onDragMove, { passive: true });
            document.addEventListener('touchmove',  onDragMove, { passive: true });
            document.addEventListener('mouseup',    onDragEnd);
            document.addEventListener('touchend',   onDragEnd);
        }

        function onDragMove(e) {
            if (!isDragging || !topCard) return;
            const pt  = e.touches ? e.touches[0] : e;
            currentX  = pt.clientX - startX;
            currentY  = pt.clientY - startY;
            const rot = currentX * 0.12;

            topCard.style.transform = `translateX(${currentX}px) translateY(${currentY}px) rotate(${rot}deg)`;

            // show indicator
            showIndicator(currentX, currentY);
        }

        function showIndicator(dx, dy) {
            const inds = topCard ? topCard.querySelectorAll('.swipe-indicator') : [];
            const ABS_X = Math.abs(dx), ABS_Y = Math.abs(dy);
            const threshold = 30;
            inds.forEach(ind => ind.style.opacity = '0');
            if (ABS_X > threshold || ABS_Y > threshold) {
                if (ABS_X > ABS_Y) {
                    const ind = topCard.querySelector(dx > 0 ? '.swipe-indicator.right' : '.swipe-indicator.left');
                    if (ind) ind.style.opacity = Math.min(1, (ABS_X - threshold) / 60).toString();
                } else {
                    const ind = topCard.querySelector(dy > 0 ? '.swipe-indicator.down' : '.swipe-indicator.up');
                    if (ind) ind.style.opacity = Math.min(1, (ABS_Y - threshold) / 60).toString();
                }
            }
        }

        function onDragEnd() {
            document.removeEventListener('mousemove',  onDragMove);
            document.removeEventListener('touchmove',  onDragMove);
            document.removeEventListener('mouseup',    onDragEnd);
            document.removeEventListener('touchend',   onDragEnd);

            if (!isDragging || !topCard) { isDragging = false; return; }
            isDragging = false;

            const ABS_X = Math.abs(currentX), ABS_Y = Math.abs(currentY);
            const SWIPE_THRESHOLD = 80;

            if (ABS_X > SWIPE_THRESHOLD || ABS_Y > SWIPE_THRESHOLD) {
                // determine fly-out direction
                let flyX = 0, flyY = 0;
                if (ABS_X >= ABS_Y) {
                    flyX = currentX > 0 ? window.innerWidth * 1.4 : -window.innerWidth * 1.4;
                    flyY = currentY * 2;
                } else {
                    flyY = currentY > 0 ? window.innerHeight * 1.4 : -window.innerHeight * 1.4;
                    flyX = currentX * 2;
                }
                flyCard(flyX, flyY);
            } else {
                // snap back
                topCard.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
                topCard.style.transform  = 'translateX(0) translateY(0) rotate(0deg)';
                topCard.querySelectorAll('.swipe-indicator').forEach(i => i.style.opacity = '0');
                topCard.style.cursor = 'grab';
            }
        }

        function flyCard(flyX, flyY) {
            if (!topCard) return;
            animating = true;

            const rot = flyX * 0.15;
            topCard.style.transition = 'transform 0.52s cubic-bezier(0.4,0,1,1), opacity 0.52s ease';
            topCard.style.transform  = `translateX(${flyX}px) translateY(${flyY}px) rotate(${rot}deg)`;
            topCard.style.opacity    = '0';
            topCard.querySelectorAll('.swipe-indicator').forEach(i => i.style.opacity = '0');

            // Shift remaining cards forward visually
            shiftCardsForward();

            setTimeout(() => {
                // move top card to the back
                currentIndex = (currentIndex + 1) % IMAGES.length;
                topCard = null;
                buildStack();
                animating = false;
            }, 520);
        }

        function shiftCardsForward() {
            const cards = [...cardStack.querySelectorAll('.photo-card')];
            // cards are rendered bottom-to-top, so last in DOM = top (stackPos 0)
            // we skip the last card (being flung) and animate the rest
            cards.forEach(card => {
                const pos = parseInt(card.dataset.stackPos);
                if (pos > 0) {
                    positionCard(card, pos - 1, true);
                }
            });
        }

        // ---- Open / Close ----
        function openSlider() {
            currentIndex = 0;
            buildStack();
            sliderOverlay.classList.add('active');

            // fade out hint after 3s
            clearTimeout(hintTimer);
            sliderHint.classList.remove('fade');
            hintTimer = setTimeout(() => sliderHint.classList.add('fade'), 3000);
        }

        function closeSlider() {
            sliderOverlay.classList.remove('active');
        }

        openBtn.addEventListener('click', e => {
            e.stopPropagation();
            // close letter first
            const envOverlay = document.getElementById('envOverlay');
            envOverlay.classList.remove('show');
            setTimeout(openSlider, 350);
        });

        sliderClose.addEventListener('click', closeSlider);

        sliderOverlay.addEventListener('click', e => {
            if (e.target === sliderOverlay) closeSlider();
        });
    })();
    </script>
</body>
