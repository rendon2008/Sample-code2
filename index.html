<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Riri</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== Microphone Permission Screen ===== -->
<div id="permission-screen" class="permission-screen">
    <div class="permission-content">
        <div class="microphone-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M19 11C19 15.42 15.87 19 12 19C8.13 19 5 15.42 5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 19V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <p class="permission-text">Please allow microphone access<br>to blow out the candles</p>
<button id="request-mic-btn" class="request-mic-btn" onclick="requestMicrophoneAccess()">Request Microphone Access</button>    </div>
</div>
    <!-- ===== Main Birthday Scene ===== -->
    <div id="birthday-scene" class="birthday-scene hidden">

        <!-- Background -->
        <div class="bg-gradient"></div>
        <div class="sparkles"></div>

        <!-- Top Message -->
        <div id="message" class="message">BLOW THE CANDLES!!</div>

        <!-- ===== Cake ===== -->
        <div class="cake-container">
            <div class="cake">

                <div class="cake-plate"></div>

                <div class="cake-base">
                    <div class="piped-border">
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                        <div class="piped-dot"></div>
                    </div>
                    <div class="side-flowers">
                        <div class="side-flower"></div>
                        <div class="side-flower"></div>
                        <div class="side-flower"></div>
                        <div class="side-flower"></div>
                    </div>
                    <div class="sprinkles">
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                        <div class="sprinkle"></div>
                    </div>
                </div>

                <div class="cake-top">
                    <div class="drip-frosting">
                        <div class="drip drip-1"></div>
                        <div class="drip drip-2"></div>
                        <div class="drip drip-3"></div>
                        <div class="drip drip-4"></div>
                        <div class="drip drip-5"></div>
                        <div class="drip drip-6"></div>
                        <div class="drip drip-7"></div>
                        <div class="drip drip-8"></div>
                    </div>
                    <div class="icing-swirls">
                        <div class="swirl swirl-1">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                        <div class="swirl swirl-2">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                        <div class="swirl swirl-3">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                        <div class="swirl swirl-4">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                        <div class="swirl swirl-5">
                            <div class="candle">
                                <div class="candle-body">
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                    <div class="candle-stripe"></div>
                                </div>
                                <div class="flame-container">
                                    <div class="flame"></div>
                                    <div class="flame-glow"></div>
                                </div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                    </div>
                    <div class="strawberry-container">
                        <div class="strawberry">
                            <div class="strawberry-body"></div>
                            <div class="strawberry-seeds">
                                <div class="seed"></div>
                                <div class="seed"></div>
                                <div class="seed"></div>
                                <div class="seed"></div>
                                <div class="seed"></div>
                                <div class="seed"></div>
                            </div>
                            <div class="strawberry-leaves">
                                <div class="leaf"></div>
                                <div class="leaf"></div>
                                <div class="leaf"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- end .cake -->
            <div class="cake-shadow"></div>
        </div><!-- end .cake-container -->

        <!-- Relight Button -->

        <!-- Bottom Buttons Row -->

        <div id="bouquet-btn" class="bouquet-btn">
    <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">

        <!-- White rectangle background (same as photo button) -->
        <rect x="2" y="2" width="96" height="76" rx="8" ry="8" fill="white" stroke="#333" stroke-width="3"/>

        <!-- Wrapper / cone (light pink tinted like the ref's light blue but pink-themed) -->
        <path d="M28 72 Q22 55 24 38 Q36 32 50 30 Q64 32 74 38 Q76 55 68 72 Q58 75 50 76 Q40 75 28 72Z" fill="#FFE8F0" stroke="#333" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Wrapper fold left -->
        <path d="M28 72 Q20 68 18 58 Q22 55 24 38 Q26 48 30 60Z" fill="#FFD0E4" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
        <!-- Ribbon tails -->
        <path d="M44 74 Q40 80 36 78 Q38 73 42 71Z" fill="#FFD0E4" stroke="#333" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M56 74 Q60 80 64 78 Q62 73 58 71Z" fill="#FFD0E4" stroke="#333" stroke-width="1.8" stroke-linejoin="round"/>

        <!-- Leaves (green, behind roses) -->
        <path d="M34 34 Q22 20 26 12 Q34 18 36 30Z" fill="#3DAA6A" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
        <path d="M50 28 Q50 14 54 8 Q60 14 56 28Z" fill="#3DAA6A" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
        <path d="M66 34 Q74 20 78 24 Q74 32 66 36Z" fill="#3DAA6A" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
        <!-- Lower right leaf -->
        <path d="M70 50 Q80 46 84 50 Q80 58 70 56Z" fill="#3DAA6A" stroke="#333" stroke-width="2" stroke-linejoin="round"/>

        <!-- Rose bottom-center -->
        <circle cx="50" cy="52" r="11" fill="#FF6B7A" stroke="#333" stroke-width="2.2"/>
        <path d="M50 52 Q46 46 50 43 Q54 46 50 52Z" fill="#E8404F" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M50 43 Q44 40 43 46 Q46 43 50 43Z" fill="#FF8A95" stroke="#333" stroke-width="1.2"/>
        <path d="M43 46 Q40 52 44 56 Q43 50 47 48Z" fill="#FF8A95" stroke="#333" stroke-width="1.2"/>
        <!-- Rose top-left -->
        <circle cx="34" cy="38" r="10" fill="#FF6B7A" stroke="#333" stroke-width="2.2"/>
        <path d="M34 38 Q30 32 34 29 Q38 32 34 38Z" fill="#E8404F" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M34 29 Q28 26 27 32 Q30 29 34 29Z" fill="#FF8A95" stroke="#333" stroke-width="1.2"/>
        <path d="M27 32 Q24 38 28 42 Q27 36 31 34Z" fill="#FF8A95" stroke="#333" stroke-width="1.2"/>
        <!-- Rose top-right -->
        <circle cx="66" cy="38" r="10" fill="#FF6B7A" stroke="#333" stroke-width="2.2"/>
        <path d="M66 38 Q62 32 66 29 Q70 32 66 38Z" fill="#E8404F" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M66 29 Q60 26 59 32 Q62 29 66 29Z" fill="#FF8A95" stroke="#333" stroke-width="1.2"/>
        <path d="M59 32 Q56 38 60 42 Q59 36 63 34Z" fill="#FF8A95" stroke="#333" stroke-width="1.2"/>

    </svg>
</div>

        



        
    
    <!-- Envelope Icon Button -->
    <div id="message-btn" class="message-btn">
        <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="96" height="76" rx="8" ry="8" fill="white" stroke="#333" stroke-width="3"/>
            <line x1="2" y1="78" x2="38" y2="40" stroke="#333" stroke-width="2.5"/>
            <line x1="98" y1="78" x2="62" y2="40" stroke="#333" stroke-width="2.5"/>
            <line x1="2" y1="2" x2="38" y2="40" stroke="#333" stroke-width="2.5"/>
            <line x1="98" y1="2" x2="62" y2="40" stroke="#333" stroke-width="2.5"/>
            <path d="M50 58 C50 58 28 44 28 32 C28 24 34 19 40 19 C44 19 48 22 50 25 C52 22 56 19 60 19 C66 19 72 24 72 32 C72 44 50 58 50 58Z" fill="#FF1493" stroke="#333" stroke-width="2"/>
        </svg>
    </div>
    <!-- Photo Slider Button -->
    <div id="openSliderBtn" class="photo-btn">
        <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="10" width="96" height="65" rx="8" ry="8" fill="white" stroke="#333" stroke-width="3"/>
            <circle cx="50" cy="43" r="18" fill="none" stroke="#FF1493" stroke-width="3"/>
            <circle cx="50" cy="43" r="10" fill="#FF1493"/>
            <circle cx="80" cy="22" r="5" fill="#FF1493"/>
        </svg>
    </div>
</div>
        
        


        <!-- ===== Envelope Modal ===== -->
        <div class="env-overlay" id="envOverlay">
            <div class="env-wrapper" id="envWrapper">

                <!-- Letter inside envelope -->
                <div class="letter" id="letter">
                    <div class="letter-lines">
                        <div class="letter-line"></div>
                        <div class="letter-line"></div>
                    </div>
                    <div class="letter-text">
                        I'm so sorry baby, my cake to u is online 🥹<br>
                        but every memory we have is real & I made u something special —
                    </div>
                    <div class="letter-lines" style="margin-top:10px; margin-bottom:0">
                        <div class="letter-line"></div>
                        <div class="letter-line"></div>
                    </div>

                    <div class="letter-heart">🌸</div>
                </div>

                <!-- Envelope shell -->
                <div class="envelope">
                    <div class="env-body">
                        <div class="env-bottom-left"></div>
                        <div class="env-bottom-right"></div>
                    </div>
                    <div class="env-flap" id="envFlap"></div>
                    <div class="heart-seal" id="heartSeal">❤️</div>
                </div>

                <div class="close-hint">click anywhere to close</div>
            </div>
        </div>

        <!-- ===== Card Slider Fullscreen Overlay ===== -->
        <div id="sliderOverlay" class="slider-overlay">
            <button id="sliderClose" class="slider-close">✕</button>
            <div id="cardStack" class="card-stack"></div>
            <div class="slider-hint" id="sliderHint">← swipe in any direction →</div>
        </div>

        <!-- Celebration Elements -->
        <canvas id="confetti-canvas"></canvas>
        <div id="balloons" class="balloons"></div>
        <div class="party-poppers">
            <div class="popper popper-left"></div>
            <div class="popper popper-right"></div>
        </div>

    </div><!-- end #birthday-scene -->

    <script src="script.js"></script>
</body>
</html>
